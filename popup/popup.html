<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0d12;
      --bg-surface: #12171f;
      --bg-elevated: #1a2029;
      --bg-hover: #242c38;
      --accent-cyan: #00d4aa;
      --accent-cyan-dim: rgba(0, 212, 170, 0.15);
      --accent-cyan-glow: rgba(0, 212, 170, 0.4);
      --accent-amber: #f59e0b;
      --accent-amber-dim: rgba(245, 158, 11, 0.15);
      --accent-blue: #3b82f6;
      --accent-blue-dim: rgba(59, 130, 246, 0.15);
      --accent-rose: #f43f5e;
      --accent-rose-dim: rgba(244, 63, 94, 0.15);
      --accent-green: #22c55e;
      --accent-green-dim: rgba(34, 197, 94, 0.15);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-subtle: rgba(148, 163, 184, 0.1);
      --border-accent: rgba(0, 212, 170, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 440px;
      min-height: 400px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
    }

    /* Header */
    .header {
      padding: 16px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 24px;
      filter: drop-shadow(0 0 8px var(--accent-cyan-glow));
    }

    .header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 600;
    }

    .header .subtitle {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Status indicator */
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-indicator.idle {
      background: var(--bg-elevated);
      color: var(--text-muted);
    }

    .status-indicator.running {
      background: var(--accent-green-dim);
      color: var(--accent-green);
    }

    .status-indicator.paused {
      background: var(--accent-amber-dim);
      color: var(--accent-amber);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-indicator.running .status-dot {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* Control panel */
    .control-panel {
      padding: 16px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
    }

    .control-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-cyan-glow);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--border-accent);
    }

    .btn-danger {
      background: var(--accent-rose-dim);
      color: var(--accent-rose);
      border: 1px solid transparent;
    }

    .btn-danger:hover {
      background: var(--accent-rose);
      color: white;
    }

    /* Current task display */
    .current-task {
      background: var(--bg-elevated);
      border-radius: 8px;
      padding: 12px 14px;
      display: none;
    }

    .current-task.active {
      display: block;
    }

    .current-task-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .current-task-domain {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-cyan);
    }

    .current-task-state {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Import section */
    .import-section {
      padding: 12px 20px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-subtle);
    }

    .import-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .import-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-import {
      flex: 1;
      padding: 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-import:hover {
      border-color: var(--border-accent);
      color: var(--accent-cyan);
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 20px;
      background: var(--bg-deep);
    }

    .stat {
      text-align: center;
      padding: 10px;
      background: var(--bg-surface);
      border-radius: 8px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .stat.queued .stat-value { color: var(--text-secondary); }
    .stat.active .stat-value { color: var(--accent-amber); }
    .stat.complete .stat-value { color: var(--accent-green); }
    .stat.error .stat-value { color: var(--accent-rose); }

    /* Domain list */
    .domain-list-header {
      padding: 10px 20px;
      background: var(--bg-elevated);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-subtle);
    }

    .domain-list-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .btn-clear-all {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      padding: 4px 10px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid var(--accent-rose-dim);
      color: var(--accent-rose);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-clear-all:hover {
      background: var(--accent-rose-dim);
    }

    .domain-list {
      max-height: 200px;
      overflow-y: auto;
      padding: 12px 20px;
    }

    .domain-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-surface);
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 3px solid var(--text-muted);
    }

    .domain-item:last-child { margin-bottom: 0; }

    .domain-item.queued { border-left-color: var(--text-muted); }
    .domain-item.getting_auth,
    .domain-item.adding_to_cloudflare,
    .domain-item.getting_cf_nameservers,
    .domain-item.updating_nameservers { border-left-color: var(--accent-amber); }
    .domain-item.complete { border-left-color: var(--accent-green); }
    .domain-item.error { border-left-color: var(--accent-rose); }

    .domain-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
    }

    .domain-state {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .domain-state.queued { background: var(--bg-elevated); color: var(--text-muted); }
    .domain-state.getting_auth,
    .domain-state.adding_to_cloudflare,
    .domain-state.getting_cf_nameservers,
    .domain-state.updating_nameservers { background: var(--accent-amber-dim); color: var(--accent-amber); }
    .domain-state.complete { background: var(--accent-green-dim); color: var(--accent-green); }
    .domain-state.error { background: var(--accent-rose-dim); color: var(--accent-rose); }

    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.5;
    }

    /* Scrollbar */
    .domain-list::-webkit-scrollbar { width: 6px; }
    .domain-list::-webkit-scrollbar-track { background: transparent; }
    .domain-list::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="logo">&#8644;</span>
      <div>
        <h1>Domain Migrator</h1>
        <div class="subtitle">Autonomous Transfer</div>
      </div>
    </div>
    <div class="status-indicator idle" id="status-indicator">
      <span class="status-dot"></span>
      <span id="status-text">Idle</span>
    </div>
  </header>

  <section class="control-panel">
    <div class="control-buttons">
      <button class="btn btn-primary" id="btn-start">
        <span>&#9654;</span> Start
      </button>
      <button class="btn btn-secondary" id="btn-pause" disabled>
        <span>&#10074;&#10074;</span> Pause
      </button>
      <button class="btn btn-danger" id="btn-stop" disabled>
        <span>&#9632;</span> Stop
      </button>
    </div>
    <div class="current-task" id="current-task">
      <div class="current-task-label">Currently processing</div>
      <div class="current-task-domain" id="current-domain">-</div>
      <div class="current-task-state" id="current-state">-</div>
    </div>
  </section>

  <section class="import-section">
    <div class="import-label">Import domains from</div>
    <div class="import-buttons">
      <button class="btn-import" id="import-godaddy">GoDaddy</button>
      <button class="btn-import" id="import-squarespace">Squarespace</button>
      <button class="btn-import" id="import-manual">Add Manually</button>
    </div>
  </section>

  <section class="stats">
    <div class="stat queued">
      <div class="stat-value" id="stat-queued">0</div>
      <div class="stat-label">Queued</div>
    </div>
    <div class="stat active">
      <div class="stat-value" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat complete">
      <div class="stat-value" id="stat-complete">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat error">
      <div class="stat-value" id="stat-error">0</div>
      <div class="stat-label">Errors</div>
    </div>
  </section>

  <div class="domain-list-header">
    <span class="domain-list-title">Domains</span>
    <button class="btn-clear-all" id="btn-clear">Clear All</button>
  </div>

  <div class="domain-list" id="domain-list">
    <div class="empty-state">
      <div class="empty-state-icon">&#128269;</div>
      <h3>No domains yet</h3>
      <p>Import domains from GoDaddy or Squarespace,<br>or add them manually to get started.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
